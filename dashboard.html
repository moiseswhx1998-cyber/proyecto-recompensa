<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dashboard">

<div class="header">
  Panel de recompensas
</div>

<div class="container-dashboard">

  <div class="card-dashboard">
    <h3>Hola, David</h3>
    <p>Tu recompensa disponible:</p>
    <h2>$500 USD</h2>
  </div>

  <div class="card-dashboard">
    <h3>Estado</h3>
    <p>✔ Verificado</p>
    <p>⏳ Pendiente de retiro</p>
  </div>

  <div class="card-dashboard">
    <h3>Última actividad</h3>
    <p>Hoy - Verificación completada</p>
  </div>

  <div class="card-dashboard">
    <button>Retirar ahora</button>
    <button>Cambiar método</button>
  </div>

</div>

</body>
</html>
