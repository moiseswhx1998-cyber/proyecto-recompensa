<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reclamar recompensa</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  Plataforma de Recompensas
</div>

<div class="container">
  <div class="card">

    <h2>Reclama tu recompensa</h2>
    <p>Accede para verificar tu premio disponible</p>

    <input id="email" placeholder="Email o usuario">
    <input id="pass" type="password" placeholder="Contraseña">

    <label><input type="checkbox"> Recordarme</label>

    <button onclick="login()">Reclamar ahora</button>

    <div id="loader" class="loader">
      <p>Verificando información...</p>
    </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
